name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 */3 * *'  # cada 3 días a las 12:00 UTC
  workflow_dispatch:         # te permite dispararlo a mano desde GitHub también

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          curl -f "https://vkzlwwnymsxrkrbdbnbg.supabase.co/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"
